<!DOCTYPE html>
<html>
<head>
  <title>Toggle App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔒 LOGIN -->
<div id="lock" class="screen">
  <div class="login-card">
    <h2>Login</h2>
    <input id="pass" type="password" placeholder="Enter password">
    <button onclick="unlock()">Unlock</button>
    <p id="err"></p>
  </div>
</div>

<!-- 📱 MAIN -->
<div id="app" class="screen hidden">
  <div class="card">

    <h2>Toggle App</h2>

    <p id="count">📱 Devices: 0</p>

    <h3 id="mode">🔴 BLOCK MODE</h3>

    <button onclick="block()" class="block">BLOCK</button>

    <p>Camera: <span id="cam">BLOCKED</span></p>
    <p>Mic: <span id="mic">BLOCKED</span></p>

    <button onclick="allow()" class="allow">ALLOW</button>
    <button onclick="scan()" class="bt">Scan Device</button>

  </div>

  <!-- ⚙️ FLOAT BUTTON -->
  <button class="fab" onclick="openSettings()">⚙</button>
</div>

<!-- ⚙ SETTINGS MENU -->
<div id="settings" class="screen hidden">
  <div class="card">

    <h2>Settings</h2>

    <div class="option" onclick="openDevices()">📱 Devices</div>
    <div class="option" onclick="toggleTheme()">🎨 Theme</div>
    <div class="option" onclick="showChangePass()">🔐 Change Password</div>
    <div class="option danger" onclick="logout()">🚪 Logout</div>

    <button onclick="back()">⬅ Back</button>

  </div>
</div>

<!-- 📱 DEVICES SCREEN -->
<div id="devicesScreen" class="screen hidden">
  <div class="card">
    <h2>Devices</h2>
    <ul id="deviceList"></ul>
    <button onclick="backToSettings()">⬅ Back</button>
  </div>
</div>

<!-- 🔐 CHANGE PASSWORD -->
<div id="passScreen" class="screen hidden">
  <div class="card">
    <h2>Change Password</h2>
    <input id="newPass" placeholder="New password">
    <button onclick="changePassword()">Save</button>
    <button onclick="backToSettings()">⬅ Back</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>

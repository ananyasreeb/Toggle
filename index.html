<!DOCTYPE html>
<html>
<head>
  <title>Toggle App</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="lock" class="screen">
  <div class="login-card">

    <h1>🔐</h1>
    <h2>Welcome Back</h2>
    <p class="sub">Enter your password</p>

    <input id="pass" type="password" placeholder="Enter password">

    <button onclick="unlock()" class="login-btn">Unlock</button>

    <p id="err"></p>

  </div>
</div>

<!-- 📱 MAIN APP -->
<div id="app" class="screen hidden">
  <div class="card">

    <!-- ⚙ TOP BAR -->
    <div class="topbar">
      <h2>Toggle App</h2>
      <button onclick="openSettings()">⚙</button>
    </div>

    <p id="count">📱 Devices: 0</p>

    <h3 id="mode">🔴 BLOCK MODE</h3>

    <button onclick="block()" class="block">BLOCK</button>

    <p>Camera: <span id="cam">BLOCKED</span></p>
    <p>Mic: <span id="mic">BLOCKED</span></p>

    <button onclick="allow()" class="allow">ALLOW</button>

    <button onclick="scan()" class="bt">Scan Device</button>

  </div>
</div>

<!-- ⚙ SETTINGS -->
<div id="settings" class="screen hidden">
  <div class="card">

    <h2>Settings</h2>

    <p><b>Profile:</b> User</p>

    <h3>Devices</h3>
    <ul id="deviceList"></ul>

    <h3>Theme</h3>
    <button onclick="toggleTheme()">Toggle Dark/Light</button>

    <h3>Change Password</h3>
    <input id="newPass" placeholder="New password">
    <button onclick="changePassword()">Save</button>

    <button onclick="logout()" class="block">Logout</button>
    <button onclick="back()">⬅ Back</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
